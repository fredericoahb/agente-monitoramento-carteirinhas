name: CI - Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: carteirinhas_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Setup database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d carteirinhas_db -f database/schema.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d carteirinhas_db -f database/seeds.sql

      - name: Start backend
        run: |
          cd backend
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/carteirinhas_db" > .env
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 15); do
            curl -s http://localhost:8000/health && break
            sleep 2
          done

      - name: Test API endpoints
        run: |
          echo "=== Health ==="
          curl -f http://localhost:8000/health
          echo ""
          echo "=== Processar ==="
          curl -f -X POST http://localhost:8000/api/processar
          echo ""
          echo "=== Resumo ==="
          curl -f http://localhost:8000/api/resumo
          echo ""
          echo "=== Alertas ==="
          curl -f "http://localhost:8000/api/alertas?limit=5"
          echo ""
          echo "=== Empresas ==="
          curl -f http://localhost:8000/api/empresas
          echo ""
          echo "All API tests passed!"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          NEXT_PUBLIC_API_URL=http://localhost:8000 npm run build
